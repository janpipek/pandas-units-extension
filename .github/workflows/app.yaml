name: pandas-units-extension

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python: "3.14"

          - os: macos-latest
            python: "3.14"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.24"
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run pytest
        run: uv run pytest

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.24"
          python-version: "3.14"
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run ruff
        run: uv run ruff check

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.24"
          python-version: "3.14"
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build
        run: uv build
